<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Earnings'" [items]="[]" [active_item]="'Earnings'"></app-breadcrumb>
    </div>
    <div class="dashboard-filters">
      <button
        mat-button
        class="filter-button"
        *ngFor="let range of rangeOptions"
        [class.active]="selectedRange === range.id"
        (click)="setRange(range.id)"
      >
        {{ range.label }}
      </button>
    </div>
    <div class="card">
      <div class="card-header">
        <h4>All Earnings</h4>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Date</th>
                <th>Patient</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngIf="!isLoading && earnings.length === 0">
                <td colspan="5" class="empty-cell">No earnings found for this range.</td>
              </tr>
              <tr *ngFor="let row of earnings">
                <td>{{ row.date | date:'mediumDate' }}</td>
                <td>
                  <button mat-button class="link-button" (click)="openPatient(row)">
                    {{ row.patientName }}
                  </button>
                </td>
                <td>{{ row.type }}</td>
                <td>{{ row.amount | number }}</td>
                <td>{{ row.details || '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div *ngIf="isLoading" class="loading-text">Loading...</div>
      </div>
    </div>
  </div>
</section>
