<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'Treatments'" [items]="[]" [active_item]="'Treatments'"></app-breadcrumb>
    </div>
    <div class="dashboard-filters">
      <button
        mat-button
        class="filter-button"
        *ngFor="let range of rangeOptions"
        [class.active]="selectedRange === range.id"
        (click)="setRange(range.id)"
      >
        {{ range.label }}
      </button>
    </div>
    <div class="card">
      <div class="card-header">
        <h4>All Treatments</h4>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Date</th>
                <th>Patient</th>
                <th>Price</th>
                <th>Discount</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngIf="!isLoading && treatments.length === 0">
                <td colspan="5" class="empty-cell">No treatments found for this range.</td>
              </tr>
              <tr *ngFor="let row of treatments">
                <td>{{ row.date | date:'mediumDate' }}</td>
                <td>
                  <button mat-button class="link-button" (click)="openPatient(row)">
                    {{ row.patientName }}
                  </button>
                </td>
                <td>{{ row.price | number }}</td>
                <td>{{ row.discount | number }}</td>
                <td>{{ row.details || '-' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div *ngIf="isLoading" class="loading-text">Loading...</div>
      </div>
    </div>
  </div>
</section>
