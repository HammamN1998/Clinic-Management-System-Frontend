<section class="content">
  <div class="content-block">
    <div class="block-header">
      <!-- breadcrumb -->
      <app-breadcrumb [title]="'Pricing'" [items]="['Extra']" [active_item]="'Pricing'"></app-breadcrumb>
    </div>
    <div class="row clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <div class="card">
          <div class="header">
            <h2>
              <strong>Plans</strong> available
            </h2>
          </div>
          <div class="body">
            <div class="demo">
              <div class="container">
                <div class="row">
                  <div *ngFor="let plan of PAYMENT_PLANS; let i = index"class="col-md-6 col-lg-5 col-xl-4">
                    <div class="pricingTable" [ngClass]="i === 0 ? 'greenColor' : 'redColor'">
                      <div class="pricingTable-header">
                        <i class="material-icons">brightness_medium</i>
                        <div class="price-value"> ${{selectedPrices[i].price}}
                          <span class="month">{{selectedPrices[i].duration}}</span>
                        </div>
                      </div>
                      <h3 class="heading">{{plan.name}}</h3>
                      <div class="pricing-content">
                        <ul>
                          <li>
                            <span style="white-space: pre-line;">{{plan.description}}</span>
                          </li>
                        </ul>
                      </div>
                      <div class="body">
                        <mat-tab-group dynamicHeight>
                          <!--Renewable Plans-->
                          <mat-tab>
                            <ng-template mat-tab-label >
                              Renewable
                            </ng-template>
                            <ng-container>
                              <div class="body">
                                <mat-radio-group class="example-radio-group" [(ngModel)]="selectedPrices[i]">
                                  <mat-radio-button *ngFor="let price of renewablePrices(plan)" [value]="price">
                                    <b class="price">${{price.price}}</b> {{price.duration}}
                                  </mat-radio-button>
                                </mat-radio-group>
                              </div>
                            </ng-container>
                          </mat-tab>
                          <!--Non-renewable Plans-->
                          <mat-tab>
                            <ng-template mat-tab-label>
                              Non-renewable
                            </ng-template>
                            <ng-container >
                              <mat-radio-group class="example-radio-group" [(ngModel)]="selectedPrices[i]">
                                <mat-radio-button *ngFor="let price of nonRenewablePrices(plan)" [value]="price">
                                  <b class="price">${{price.price}}</b> {{price.duration}}
                                </mat-radio-button>
                              </mat-radio-group>
                            </ng-container>
                          </mat-tab>
                        </mat-tab-group>
                      </div>
                      <div class="pricingTable-signup">
                        <div style="text-align:center">
                          <button (click)="pay(plan, selectedPrices[i])" mat-raised-button [class.auth-spinner]="loading" [disabled]="loading">
                            Buy Now
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
