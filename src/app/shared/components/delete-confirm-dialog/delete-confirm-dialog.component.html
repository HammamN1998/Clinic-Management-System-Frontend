<div class="container">
  <h3 mat-dialog-title>{{ 'SHARED.DELETE_DIALOG.TITLE' | translate }}</h3>
  <div mat-dialog-content>
    <p class="font-weight-bold delete-message">{{ data.message || ('SHARED.DELETE_DIALOG.DEFAULT_MESSAGE' | translate) }}</p>
  </div>
  <div mat-dialog-actions class="mb-1">
    <button mat-flat-button color="warn" [mat-dialog-close]="1">
      {{ (data.confirmLabel || 'COMMON.DELETE') | translate }}
    </button>
    <button mat-flat-button (click)="onNoClick()" tabindex="-1">{{ 'COMMON.CANCEL' | translate }}</button>
  </div>
</div>
