<div class="project_widget">
  <div class="header d-flex justify-content-between align-items-center">
    <h2><strong>{{headerText}}</strong></h2>
    <button mat-icon-button  matTooltip="Edit {{headerText}}" (click)="makeEditable()">
      <mat-icon>edit</mat-icon>
    </button>
  </div>
  <div class="body">
    <div #bodyTxtElement class="editable-text-body" (blur)="handleBlur()">
      {{ bodyText }}
    </div>
  </div>
</div>
