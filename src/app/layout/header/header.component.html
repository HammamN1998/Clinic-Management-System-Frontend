<nav #navbar class="navbar active">
  <div class="container-fluid">
    <div class="navbar-header">
      <a href="#" onClick="return false;" class="bars" (click)="mobileMenuSidebarOpen($event,'overlay-open')"></a>
      <a class="navbar-brand" routerLink={{homePage}}>
        <img src="assets/images/favicon.ico" alt="favicon" style="height: 32px; width: auto;" />
        <span class="logo-name">ClinicWell</span>
      </a>
      <a href="#" onClick="return false;" class="navbar-toggle collapsed"
        (click)="isNavbarCollapsed = !isNavbarCollapsed" aria-expanded="false">
      </a>
    </div>
    <div class="collapse navbar-collapse" [ngClass]="isNavbarCollapsed ? '' : 'show'">
      <ul class="float-start collapse-menu-icon">
        <li>
          <button mat-button (click)="callSidemenuCollapse()" class="sidemenu-collapse nav-notification-icons"> 
            <i class="material-icons-outlined icon-color">
              menu
            </i>
          </button>
        </li>
      </ul>
      <ul class="nav navbar-nav navbar-right">
        <!-- Email Verification -->
        <li *ngIf="!isEmailVerified">
          <span style="color: red">
            {{ 'HEADER.EMAIL_VERIFY_TEXT' | translate }}
            <button style="background: none; border: none; color: red">
              <u (click)="this.sendEmailVerificationCode()">
                {{ 'HEADER.EMAIL_VERIFY_ACTION' | translate }}
              </u>
            </button>
          </span>
        </li>
        <!-- Billing Portal -->
        <li *ngIf="this.doctor.subscription.status !== 'active'">
          <span style="color: red">
            {{ 'HEADER.PLAN_INACTIVE_TEXT' | translate }}
            <button type="button" style="background: none; border: none; color: red" (click)="openBillingPortal()" [class.auth-spinner]="billingPortalLoading" [disabled]="billingPortalLoading">
              <u>
                {{ 'HEADER.PLAN_MANAGE_ACTION' | translate }}
              </u>
            </button>
          </span>
        </li>
        <!-- Full Screen Button -->
        <li class="fullscreen">
          <button mat-button class="nav-notification-icons" (click)="callFullscreen()"> <i
              class="material-icons-outlined icon-color">
              fullscreen
            </i></button>
        </li>
        <!-- #END# Full Screen Button -->
        <!-- Language Selection -->
        <li class="nav-item">
          <button mat-button [matMenuTriggerFor]="languagemenu" class="lang-dropdown nav-notification-icons">
            <img *ngIf="flagvalue" src="{{flagvalue}}" height="16">
            <img *ngIf="!flagvalue" src="{{defaultFlag}}" height="16">
          </button>
          <mat-menu #languagemenu="matMenu" class="lang-item-menu">
            <div *ngFor="let item of listLang" class="lang-item">
              <button mat-menu-item class="dropdown-item lang-item-list"
                (click)="setLanguage(item.text, item.lang, item.flag)"
                [ngClass]="{'active': langStoreValue === item.lang}">
                <img src="{{item.flag}}" class="flag-img" height="12"> <span class="align-middle">{{item.text}}</span>
              </button>
            </div>
          </mat-menu>
        </li>
        <!-- #END# Language Selection -->
        <li class="nav-item user_profile">
          <button mat-button [matMenuTriggerFor]="profilemenu">
            <div class="chip dropdown-toggle" ngbDropdownToggle class="">
              <span>{{ doctorTitlePrefix }} {{ doctor.name }}</span>
            </div>
          </button>
          <mat-menu #profilemenu="matMenu" class="profile-menu">
            <div class="noti-list">
              <div class="menu ">
                <div class="user_dw_menu">
                  <button mat-menu-item class="user-item-list" (click)="goToDoctorProfilePage()">
                    <app-feather-icons [icon]="'user'" [class]="'user-menu-icons'"></app-feather-icons>{{ 'HEADER.ACCOUNT' | translate }}
                  </button>
                  <button mat-menu-item (click)="logout()" class="user-item-list">
                    <app-feather-icons [icon]="'log-out'" [class]="'user-menu-icons'"></app-feather-icons>{{ 'HEADER.LOGOUT' | translate }}
                  </button>
                </div>
              </div>
            </div>
          </mat-menu>
        </li>
        <!-- #END# Tasks -->
      </ul>
    </div>
  </div>
</nav>
