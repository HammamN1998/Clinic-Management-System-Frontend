<div class="auth-container">
  <div class="row auth-main">
    <div class="col-sm-6 px-0 d-none d-sm-block">
      <div class="left-img" style="background-image: url(assets/images/login-page/login-image-5.jpg);">
      </div>
    </div>
    <div class="col-sm-6 auth-form-section">
      <div class="form-section">
        <div class="auth-wrapper">
          <h2 class="welcome-msg"> {{ 'AUTH.FORGOT.TITLE' | translate }} </h2>
          <p class="auth-signup-text text-muted">{{ 'AUTH.FORGOT.SUBTITLE' | translate }}</p>
          <form class="validate-form" [formGroup]="authForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 mb-2">
                <span class="error-subheader2 p-t-20 p-b-15">
                  {{ 'AUTH.FORGOT.HINT' | translate }}
                </span>
                <mat-form-field class="example-full-width" appearance="outline">
                  <mat-label>{{ 'COMMON.EMAIL' | translate }}</mat-label>
                  <input matInput formControlName="email" required>
                  <mat-icon class="material-icons-two-tone color-icon p-3" matSuffix>mail</mat-icon>
                  <mat-error *ngIf="authForm.get('email')!.hasError('required') || authForm.get('email')!.touched">
                    {{ 'VALIDATION.EMAIL_INVALID' | translate }}
                  </mat-error>
                </mat-form-field>
              </div>
            </div>
            <div class="container-auth-form-btn mt-5">
              <button mat-raised-button color="primary" class="auth-form-btn" [disabled]="!authForm.valid "
                type="submit">
                {{ 'AUTH.FORGOT.RESET' | translate }}
              </button>
            </div>
            <div class="w-full p-t-25 text-center">
              <div>
                <a routerLink="/authentication/signin" class="txt1">
                  {{ 'AUTH.FORGOT.LOGIN_LINK' | translate }}
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>
